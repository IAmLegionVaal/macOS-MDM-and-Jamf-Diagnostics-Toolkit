name: Bash validation

on:
  push:
    paths:
      - "src/**/*.sh"
      - ".github/workflows/bash-validation.yml"
  pull_request:
    paths:
      - "src/**/*.sh"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Validate Bash syntax
        run: find src -type f -name '*.sh' -print0 | xargs -0 -r -n1 bash -n
      - name: Run ShellCheck
        run: find src -type f -name '*.sh' -print0 | xargs -0 -r shellcheck -x
